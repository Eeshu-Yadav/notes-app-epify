services:
  - type: web
    name: notes-app
    runtime: python
    plan: free
    region: oregon
    branch: main
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn notesapp.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --threads 2 --timeout 30"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOW_ALL
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: notes-db
          property: connectionString

databases:
  - name: notes-db
    plan: free
    postgresMajorVersion: 16
